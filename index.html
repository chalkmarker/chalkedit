<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Edit</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1A1714;--gold:#D4B07A;
  --bg:#1A1714;--card:#241E1A;--toolbar:#1C1712;
  --border:rgba(255,255,255,0.07);--line:rgba(255,255,255,0.06);
  --t1:#F0EAE2;--t2:#7A6E64;--t3:#4A4038;
  --note-bg:rgba(255,255,255,0.05);--note-c:#8A7E74;
}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}
.hdr{background:#1A1714;padding:40px 20px 28px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:20px}
@media(min-width:768px){.hdr{padding:48px 56px 36px;flex-direction:row;align-items:flex-end;justify-content:space-between}}
.wm{position:absolute;right:8px;top:-8px;font-size:72px;opacity:.06;line-height:1;color:var(--gold);font-family:serif;pointer-events:none;user-select:none}
@media(min-width:768px){.wm{font-size:120px;right:56px;top:-10px}}
.eyebrow{font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.title{font-size:40px;font-weight:200;color:var(--t1);line-height:1}
@media(min-width:768px){.title{font-size:64px}}
.title em{font-style:italic;font-weight:400}
.subtitle{font-size:11px;color:var(--t3);letter-spacing:.1em;margin-top:6px}
.pw{position:relative;z-index:1}
@media(min-width:768px){.pw{min-width:260px;text-align:right}}
.pc{display:none}
@media(min-width:768px){.pc{display:block;margin-bottom:10px}}
.pc .big{color:var(--gold);font-weight:500;font-size:28px}
.pc .sm{color:#5A4E44;font-size:18px}
.pc .lbl{display:block;font-size:10px;color:#5A4E44;letter-spacing:.12em;text-transform:uppercase;margin-top:4px}
.pbw{display:flex;align-items:center;gap:12px}
.pt{flex:1;height:1px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.pf{height:100%;background:var(--gold);border-radius:999px;transition:width .4s ease;width:0}
.pm{font-size:11px;color:var(--gold);font-weight:500;white-space:nowrap}
@media(min-width:768px){.pm{display:none}}
.toolbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:12px 16px 10px;border-bottom:1px solid var(--border);background:var(--toolbar);position:sticky;top:0;z-index:10}
@media(min-width:768px){.toolbar{padding:14px 56px}}
.fb{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;padding:4px 11px;border-radius:999px;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--t2);transition:all .15s;margin-bottom:4px}
@media(min-width:768px){.fb{font-size:11px;padding:6px 16px;margin-bottom:0}}
.fb.active{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:var(--t1)}
.rb{margin-left:auto;font-size:10px;letter-spacing:.07em;text-transform:uppercase;padding:4px 11px;border-radius:999px;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:transparent;color:#B07878}
@media(min-width:768px){.rb{font-size:11px;padding:6px 16px}}
.main{padding:4px 0 56px}
@media(min-width:768px){.main{padding:24px 56px 72px}}
.sec{margin-bottom:0}
@media(min-width:768px){.sec{margin-bottom:48px}}
.sec.hidden{display:none}
.shm{display:flex;align-items:center;gap:8px;padding:18px 16px 8px}
@media(min-width:768px){.shm{display:none}}
.shd{display:none;align-items:center;gap:12px;padding:0 0 16px}
@media(min-width:768px){.shd{display:flex}}
.sl{flex:1;height:1px;background:var(--line)}
.sls{width:24px;height:1px;background:var(--line)}
.sd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sdl{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.slbl{font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--t3)}
@media(min-width:768px){.slbl{font-size:10px;letter-spacing:.2em}}
.cg{display:block}
@media(min-width:768px){.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}}
.fc{margin:0 12px 7px;border-radius:11px;background:var(--card);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:opacity .2s,box-shadow .2s;display:flex}
@media(min-width:768px){.fc{margin:0;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.3)}}
.fc.acq{opacity:.3}
.fc.syn{border-style:dashed;border-color:rgba(255,255,255,.1)}
.fc:hover{box-shadow:0 4px 20px rgba(0,0,0,.5);border-color:rgba(255,255,255,.12)}
.fa{width:3px;flex-shrink:0}
.fb2{flex:1;padding:12px 12px 11px;display:flex;gap:10px;align-items:flex-start}
@media(min-width:768px){.fb2{padding:16px 16px 14px;flex-direction:column;gap:0}}
.ml{flex:1;min-width:0}
.mr{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;padding-top:1px}
@media(min-width:768px){.ml,.mr{display:none}}
.di{display:none;flex:1;flex-direction:column;width:100%}
@media(min-width:768px){.di{display:flex}}
.fn{font-size:14px;font-weight:500;line-height:1.2;color:var(--t1);margin-bottom:2px}
@media(min-width:768px){.fn{font-size:15px;margin-bottom:3px}}
.fc.acq .fn{text-decoration:line-through;color:var(--t3)}
.fh{font-size:11px;color:var(--t2);font-style:italic;margin-bottom:8px}
@media(min-width:768px){.fh{margin-bottom:12px}}
.caut{font-size:10px;color:#C8884A;background:rgba(200,136,74,.12);padding:2px 7px;border-radius:999px;display:inline-block;margin-bottom:8px}
.notes{display:flex;gap:4px;flex-wrap:wrap}
.np{font-size:10px;padding:2px 7px;border-radius:999px;background:var(--note-bg);color:var(--note-c);white-space:nowrap}
.lon{font-size:10px;color:var(--t3);margin-bottom:4px}
.sb{font-size:10px;font-weight:500;padding:2px 7px;border-radius:999px;display:inline-block}
.br{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.cb{width:19px;height:19px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
@media(min-width:768px){.cb{width:20px;height:20px}}
.fc.acq .cb{background:var(--gold);border-color:var(--gold)}
.ci{display:none}
.fc.acq .ci{display:block}
.spc{flex:1}
.footer{text-align:center;padding:0 16px 40px;font-size:10px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--gold);color:var(--ink);font-size:11px;font-weight:500;padding:10px 20px;border-radius:999px;white-space:nowrap;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.4);letter-spacing:.04em;opacity:0;transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;font-style:italic;color:var(--t3);font-size:15px}
</style>
</head>
<body>
<div id="app"><div class="loading">Loading...</div></div>
<div class="toast" id="toast"></div>
<script>
const FB_BASE="https://fragrances-ccf69-default-rtdb.firebaseio.com";
const FB_FRAGS=FB_BASE+"/fragrances.json";
const FB_STATE=FB_BASE+"/collection.json";

const SLOTS=[
  {id:"everyday",     label:"Everyday",         color:"#3A5C44"},
  {id:"professional", label:"Professional",     color:"#5C6B7A"},
  {id:"date",         label:"Date Night",       color:"#8C3A3A"},
  {id:"special",      label:"Special Occasion", color:"#6B4C2A"},
  {id:"unknown",      label:"Unknown",          color:"#7A6A5A"},
];

const SEED=[
  {id:"aquatica",   name:"Rayhaan Aquatica",     house:"Rayhaan",            slot:"everyday",     maxSprays:"3 sprays max",          longevity:"5-7h",   notes:["Coconut","Lime","Musk"],                                    tint:"rgba(120,200,120,0.13)"},
  {id:"pacific",    name:"Rayhaan Pacific",       house:"Rayhaan",            slot:"everyday",     maxSprays:"3 sprays max",          longevity:"4-6h",   notes:["Citrus","Aquatic","Musk"],       caution:"Skin-chemistry dependent", tint:"rgba(255,140,60,0.13)"},
  {id:"myslf",      name:"YSL MYSLF EDP",         house:"Yves Saint Laurent", slot:"everyday",     maxSprays:"2-3 sprays max",        longevity:"6-8h",   notes:["Bergamot","Orange Blossom","Sandalwood"],                   tint:"rgba(255,200,100,0.13)"},
  {id:"khamrah",    name:"Lattafa Khamrah Qahwa", house:"Lattafa",            slot:"professional", maxSprays:"1 spray max in office", longevity:"8-10h",  notes:["Coffee","Oud","Vanilla","Amber"],  caution:"Bold for enclosed spaces", tint:"rgba(200,90,20,0.16)"},
  {id:"asad",       name:"Lattafa Asad",          house:"Lattafa",            slot:"special",      maxSprays:"2 sprays max",          longevity:"8-10h",  notes:["Dark Vanilla","Spice","Smoke"],  caution:"Turns sour in heat",       tint:"rgba(10,10,10,0.22)"},
  {id:"liquidbrun", name:"Liquid Brun",           house:"French Avenue",      slot:"professional", maxSprays:"1 spray only",          longevity:"8-10h",  notes:["Vanilla","Pepper","Boozy"],      synced:true,                        tint:"rgba(200,110,40,0.14)"},
  {id:"capitale",   name:"La Capitale",           house:"Xerjoff",            slot:"date",         maxSprays:"2 sprays max",          longevity:"8-10h",  notes:["Strawberry","Saffron","Oud","Leather"],                     tint:"rgba(180,60,80,0.13)"},
  {id:"angels",     name:"Angels Share",          house:"By Kilian",          slot:"date",         maxSprays:"2 sprays max",          longevity:"8-10h",  notes:["Cognac","Oak","Cinnamon","Tonka"],                          tint:"rgba(160,100,40,0.13)"},
  {id:"liquidbrun", name:"Liquid Brun",           house:"French Avenue",      slot:"date",         maxSprays:"1 spray only",          longevity:"8-10h",  notes:["Vanilla","Pepper","Boozy"],      synced:true,                        tint:"rgba(200,110,40,0.14)"},
  {id:"vulcan",     name:"Vulcan Feu EDP",        house:"French Avenue",      slot:"special",      maxSprays:"2 sprays max",          longevity:"8-10h",  notes:["Smoke","Wood","Leather"],                                   tint:"rgba(220,80,40,0.14)"},
  {id:"vanguard",   name:"Maison Asrar Vanguard", house:"Maison Asrar",       slot:"special",      maxSprays:"2 sprays max",          longevity:"7-8h",   notes:["Pineapple","Blackcurrant","Leather","Cedar"],               tint:"rgba(230,200,40,0.14)"},
  {id:"reflection", name:"Amouage Reflection Man",house:"Amouage",            slot:"special",      maxSprays:"2-3 sprays max",        longevity:"10-12h", notes:["Neroli","Iris","Jasmine","Sandalwood"],                     tint:"rgba(180,160,200,0.13)"},
  {id:"liquidbrun", name:"Liquid Brun",           house:"French Avenue",      slot:"special",      maxSprays:"1 spray only",          longevity:"8-10h",  notes:["Vanilla","Pepper","Boozy"],      synced:true,                        tint:"rgba(200,110,40,0.14)"},
];

let FRAGRANCES=[],acquired={},currentFilter="all",uniqueCount=0,toastTimer;

async function seedIfEmpty(){
  try{
    const r=await fetch(FB_FRAGS);
    const d=await r.json();
    const has=d&&(Array.isArray(d)?d.length>0:Object.keys(d).length>0);
    if(has)return;
    await fetch(FB_FRAGS,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(SEED)});
    FRAGRANCES=SEED;
    uniqueCount=[...new Set(SEED.map(f=>f.id))].length;
  }catch(e){}
}

async function loadAll(){
  try{
    const [fr,sr]=await Promise.all([fetch(FB_FRAGS),fetch(FB_STATE)]);
    const fd=await fr.json();
    const sd=await sr.json();
    if(Array.isArray(fd)&&fd.length>0)FRAGRANCES=fd;
    else if(fd&&typeof fd==="object"&&Object.keys(fd).length>0)FRAGRANCES=Object.values(fd);
    uniqueCount=[...new Set(FRAGRANCES.map(f=>f.id))].length;
    if(sd&&typeof sd==="object")acquired=sd;
  }catch(e){}
}

async function saveState(){
  try{await fetch(FB_STATE,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(acquired)});}catch(e){}
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),1800);
}

function toggle(id){acquired[id]=!acquired[id];saveState();render();showToast(acquired[id]?"Acquired":"Removed");}
function resetAll(){acquired={};saveState();render();showToast("Reset");}
function setFilter(f){currentFilter=f;render();}

function render(){
  const uids=[...new Set(FRAGRANCES.map(f=>f.id))];
  const ac=uids.filter(id=>acquired[id]).length;
  const pct=uniqueCount>0?Math.round((ac/uniqueCount)*100):0;
  const vs=currentFilter==="all"?SLOTS:SLOTS.filter(s=>s.id===currentFilter);
  const chk='<svg width="8" height="8" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="'+((currentFilter==="all"?'#1A1714':'#1A1714'))+'" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  const checkSVG='<svg width="8" height="8" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#1A1714" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  const fbtns=[{id:"all",label:"All"},...SLOTS].map(s=>
    '<button class="fb'+(currentFilter===s.id?" active":"")+'" onclick="setFilter(\''+s.id+'\')">'+s.label+'</button>'
  ).join("");

  const secs=SLOTS.map(slot=>{
    const frags=FRAGRANCES.filter(f=>f.slot===slot.id);
    const hidden=!vs.find(s=>s.id===slot.id);
    const cards=frags.map(frag=>{
      const isAcq=!!acquired[frag.id];
      const tint=frag.tint||"rgba(160,140,120,0.08)";
      const accent=frag.synced?"linear-gradient(180deg,#5C6B7A,#8C3A3A,#6B4C2A)":slot.color;
      const pills=(frag.notes||[]).map(n=>'<span class="np">'+n+'</span>').join("");
      const caut=frag.caution?'<div class="caut">'+frag.caution+'</div>':"";
      const ss="color:"+slot.color+";background:"+slot.color+"22";
      return '<div class="fc'+(isAcq?" acq":"")+(frag.synced?" syn":"")
        +'" style="background:linear-gradient(90deg,#241E1A 45%,'+tint+' 100%)" onclick="toggle(\''+frag.id+'\')">'
        +'<div class="fa" style="background:'+accent+'"></div>'
        +'<div class="fb2">'
        +'<div class="ml"><div class="fn">'+frag.name+'</div><div class="fh">'+frag.house+'</div>'+caut+'<div class="lon">'+(frag.longevity||"")+'</div><span class="sb" style="'+ss+'">'+(frag.maxSprays||"")+'</span></div>'
        +'<div class="mr"><div class="cb">'+(isAcq?checkSVG:"")+'</div><div class="spc"></div><div class="notes">'+pills+'</div></div>'
        +'<div class="di">'
          +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:3px"><div class="fn">'+frag.name+'</div><div class="cb">'+(isAcq?checkSVG:"")+'</div></div>'
          +'<div class="fh">'+frag.house+'</div>'
          +'<div class="notes" style="margin-bottom:12px">'+pills+'</div>'
          +caut
          +'<div class="spc"></div>'
          +'<div class="br"><span style="font-size:10px;color:#4A4038">'+(frag.longevity||"")+'</span><span class="sb" style="'+ss+'">'+(frag.maxSprays||"")+'</span></div>'
        +'</div>'
        +'</div></div>';
    }).join("");

    return '<div class="sec'+(hidden?" hidden":"")+'" data-slot="'+slot.id+'">'
      +'<div class="shm"><div class="sl"></div><div style="display:flex;align-items:center;gap:5px"><div class="sd" style="background:'+slot.color+'"></div><span class="slbl">'+slot.label+'</span></div><div class="sl"></div></div>'
      +'<div class="shd"><div class="sls"></div><div class="sdl" style="background:'+slot.color+'"></div><span class="slbl">'+slot.label+'</span><div class="sl"></div></div>'
      +'<div class="cg">'+cards+'</div></div>';
  }).join("");

  document.getElementById("app").innerHTML=
    '<div class="hdr">'
      +'<div class="wm">&#39365;</div>'
      +'<div style="position:relative;z-index:1">'
        +'<div class="eyebrow">Fragrance</div>'
        +'<div class="title">The <em>Edit</em></div>'
        +'<div class="subtitle">by Mark Lee</div>'
      +'</div>'
      +'<div class="pw" style="position:relative;z-index:1">'
        +'<div class="pc"><span class="big">'+ac+'</span><span class="sm"> / '+uniqueCount+'</span><span class="lbl">Acquired</span></div>'
        +'<div class="pbw"><div class="pt"><div class="pf" style="width:'+pct+'%"></div></div><span class="pm">'+ac+' / '+uniqueCount+'</span></div>'
      +'</div>'
    +'</div>'
    +'<div class="toolbar">'+fbtns+'<button class="rb" onclick="resetAll()">Reset</button></div>'
    +'<div class="main">'+secs+'</div>'
    +'<div class="footer">The Edit &middot; chalkedit</div>';
}

(async()=>{
  try{await seedIfEmpty();await loadAll();}catch(e){}
  render();
})();
</script>
</body>
</html>
